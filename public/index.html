<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트 리포트 포털</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="4" fill="#4f8cff" opacity="0.15"/>
            <path d="M7 12l3 3 7-7" stroke="#4f8cff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="logo-text">TR <span class="logo-accent">Portal</span></span>
      </div>
      <div class="sidebar-search">
        <input type="text" id="globalSearchInput" class="search-input-sm" placeholder="🔍 검색..." onkeyup="handleSearchKeyup(event)">
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">프로젝트</div>
        <ul class="project-list" id="projectList"></ul>
        <button class="btn-add-project" onclick="openNewProjectModal(null)">+ 새 프로젝트</button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="userInfo"></div>
      <span class="version-label">v0.3.0</span>
    </div>
    <div class="sidebar-resizer" id="sidebarResizer" title="드래그로 폭 조절 · 더블클릭으로 초기화"></div>
  </aside>

  <!-- QA 통합 — 9-dot 앱 런처 (INTEGRATED 모드에서만 표시, INTEGRATION_SPEC §6) -->
  <button type="button" id="launcherBtn" onclick="toggleLauncher(event)" aria-label="앱 런처" title="QA 도구 전환">
    <span class="lgrid"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
  </button>

  <!-- 메인 영역 -->
  <div class="main-wrapper">
    <!-- 검색 결과 -->
    <main class="main-content hidden" id="searchView">
      <div class="page-header">
        <div class="page-header-left">
          <h2 id="searchTitle">검색 결과</h2>
        </div>
        <div class="page-actions">
          <select id="searchScope" class="filter-select" onchange="performSearch()">
            <option value="">전체 프로젝트</option>
          </select>
        </div>
      </div>
      <div id="searchResults" class="search-results"></div>
    </main>

    <!-- 대시보드 (프로젝트 미선택 시) -->
    <main class="main-content" id="dashboard">
      <div class="page-header">
        <h2>대시보드</h2>
      </div>
      <div class="dashboard-stats" id="dashboardStats"></div>
      <div class="dashboard-recent">
        <h3>최근 업로드</h3>
        <div id="recentReports" class="recent-list"></div>
      </div>
    </main>

    <!-- 프로젝트 상세 (프로젝트 선택 시) -->
    <main class="main-content hidden" id="projectView">
      <div class="page-header">
        <div class="page-header-left">
          <div id="projectBreadcrumb" class="breadcrumb"></div>
          <h2 id="projectTitle">프로젝트명</h2>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openUploadModal()">📤 리포트 업로드</button>
          <button class="btn btn-danger-outline" onclick="deleteCurrentProject()">🗑 삭제</button>
        </div>
      </div>
      <div class="date-groups" id="dateGroups"></div>
    </main>

    <!-- 리포트 뷰어 -->
    <main class="main-content hidden" id="reportViewer">
      <div class="viewer-bar">
        <button class="btn btn-back" onclick="goBackToProject()">← 돌아가기</button>
        <span class="viewer-title" id="viewerTitle">리포트</span>
        <button class="btn btn-sm" onclick="openReportNewTab()">새 탭에서 열기 ↗</button>
      </div>
      <iframe id="viewerFrame" class="viewer-frame"></iframe>
    </main>
  </div>

  <!-- 새 프로젝트 모달 -->
  <div class="modal-overlay hidden" id="newProjectModal">
    <div class="modal">
      <div class="modal-header">
        <h3>새 프로젝트 만들기</h3>
        <button class="modal-close" onclick="closeModal('newProjectModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>프로젝트명</label>
          <input type="text" id="newProjectName" class="form-input" placeholder="예: Web Redirect 회귀 테스트">
          <div id="newProjectParentLabel" class="form-hint" style="display:none"></div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="newProjectPrivate">
            <span>비공개 프로젝트 (나만 볼 수 있음)</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">취소</button>
        <button class="btn btn-primary" onclick="createProject()">생성</button>
      </div>
    </div>
  </div>

  <!-- 업로드 모달 -->
  <div class="modal-overlay hidden" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3>리포트 업로드</h3>
        <button class="modal-close" onclick="closeModal('uploadModal')">✕</button>
      </div>
      <div class="modal-body">
        <!-- 업로드 탭 -->
        <div class="upload-tabs">
          <button class="upload-tab active" onclick="switchUploadTab('file')">📁 파일 업로드</button>
          <button class="upload-tab" onclick="switchUploadTab('gsheet')">📊 Google Sheets</button>
        </div>

        <!-- 파일 업로드 탭 -->
        <div class="upload-tab-content active" id="uploadTabFile">
          <div class="upload-zone" id="uploadZone">
            <div class="upload-zone-content">
              <div class="upload-icon">📁</div>
              <p>HTML, ZIP, 또는 Markdown 파일을 드래그하거나 클릭하여 선택</p>
              <span class="upload-hint">폴더 리포트는 zip 압축, 문서는 .md 파일로 업로드</span>
            </div>
            <input type="file" id="fileInput" multiple accept=".html,.zip,.md" hidden>
          </div>
          <div class="upload-file-list" id="uploadFileList"></div>
        </div>

        <!-- Google Sheets 탭 -->
        <div class="upload-tab-content" id="uploadTabGsheet">
          <div class="form-group">
            <label>Spreadsheet URL</label>
            <input type="text" id="gsheetUrl" class="form-input" placeholder="URL 또는 Spreadsheet ID">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>테스트 일자</label>
            <input type="date" id="uploadDate" class="form-input">
          </div>
          <div class="form-group">
            <label>업로더</label>
            <input type="text" id="uploaderName" class="form-input" placeholder="이름">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('uploadModal')">취소</button>
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>업로드</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <div class="toast-container" id="toastContainer"></div>
</body>
</html>
