<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트 리포트 포털</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">🧪 TR Portal</h1>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">프로젝트</div>
        <ul class="project-list" id="projectList"></ul>
        <button class="btn-add-project" onclick="openNewProjectModal()">+ 새 프로젝트</button>
      </div>
    </nav>
  </aside>

  <!-- 메인 영역 -->
  <div class="main-wrapper">
    <!-- 대시보드 (프로젝트 미선택 시) -->
    <main class="main-content" id="dashboard">
      <div class="page-header">
        <h2>대시보드</h2>
      </div>
      <div class="dashboard-stats" id="dashboardStats"></div>
      <div class="dashboard-recent">
        <h3>최근 업로드</h3>
        <div id="recentReports" class="recent-list"></div>
      </div>
    </main>

    <!-- 프로젝트 상세 (프로젝트 선택 시) -->
    <main class="main-content hidden" id="projectView">
      <div class="page-header">
        <h2 id="projectTitle">프로젝트명</h2>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openUploadModal()">📤 리포트 업로드</button>
          <button class="btn btn-danger-outline" onclick="deleteCurrentProject()">🗑 프로젝트 삭제</button>
        </div>
      </div>
      <div class="date-groups" id="dateGroups"></div>
    </main>

    <!-- 리포트 뷰어 -->
    <main class="main-content hidden" id="reportViewer">
      <div class="viewer-bar">
        <button class="btn btn-back" onclick="goBackToProject()">← 돌아가기</button>
        <span class="viewer-title" id="viewerTitle">리포트</span>
        <button class="btn btn-sm" onclick="openReportNewTab()">새 탭에서 열기 ↗</button>
      </div>
      <iframe id="viewerFrame" class="viewer-frame"></iframe>
    </main>
  </div>

  <!-- 새 프로젝트 모달 -->
  <div class="modal-overlay hidden" id="newProjectModal">
    <div class="modal">
      <div class="modal-header">
        <h3>새 프로젝트 만들기</h3>
        <button class="modal-close" onclick="closeModal('newProjectModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>프로젝트명</label>
          <input type="text" id="newProjectName" class="form-input" placeholder="예: Web Redirect 회귀 테스트">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('newProjectModal')">취소</button>
        <button class="btn btn-primary" onclick="createProject()">생성</button>
      </div>
    </div>
  </div>

  <!-- 업로드 모달 -->
  <div class="modal-overlay hidden" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3>리포트 업로드</h3>
        <button class="modal-close" onclick="closeModal('uploadModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-zone-content">
            <div class="upload-icon">📁</div>
            <p>HTML 파일을 드래그하거나 클릭하여 선택</p>
            <span class="upload-hint">여러 파일 동시 업로드 가능</span>
          </div>
          <input type="file" id="fileInput" multiple accept=".html" hidden>
        </div>
        <div class="upload-file-list" id="uploadFileList"></div>
        <div class="form-row">
          <div class="form-group">
            <label>테스트 일자</label>
            <input type="date" id="uploadDate" class="form-input">
          </div>
          <div class="form-group">
            <label>업로더</label>
            <input type="text" id="uploaderName" class="form-input" placeholder="이름">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('uploadModal')">취소</button>
        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>업로드</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
